name: Build single-file index.html

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'package.json'
      - 'vite.config.js'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Sync built index.html to repo root
        run: |
          cp dist/index.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild index.html from app/ [skip ci]"
            git push
          fi
